# nixpacks.toml
# Coolify build ClearDoc avec Nixpacks. Remotion télécharge le binaire Chromium
# au runtime (bouton "Installer Remotion"), mais Chromium a besoin de librairies
# système (libnss3/libnspr4, etc.) absentes de l'image par défaut.
# Ces paquets apt sont installés lors de la phase de build et persistent dans l'image.
[phases.setup]
aptPkgs = [
  "libnss3",
  "libnspr4",
  "libdbus-1-3",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libgbm1",
  "libasound2",
  "libpango-1.0-0",
  "libcairo2",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libxkbcommon0",
  "libxshmfence1",
  "fonts-liberation"
]

# nixpacks.toml
# Coolify build ClearDoc avec Nixpacks. Remotion télécharge le binaire Chromium
# au runtime (bouton "Installer Remotion"), mais Chromium a besoin de librairies
# système absentes de l'image par défaut.
#
# IMPORTANT : l'image de base Nixpacks est Ubuntu 24.04 (Noble). Suite à la
# transition "time_t 64 bits", plusieurs paquets ont un suffixe `t64`
# (libasound2t64, libatk1.0-0t64, libcups2t64, ...). La liste ci-dessous est
# celle des dépendances Chromium pour Ubuntu 24.04 (jeu utilisé par Playwright).
[phases.setup]
aptPkgs = [
  "libnss3",
  "libnspr4",
  "libdbus-1-3",
  "libatk1.0-0t64",
  "libatk-bridge2.0-0t64",
  "libatspi2.0-0t64",
  "libcups2t64",
  "libdrm2",
  "libgbm1",
  "libasound2t64",
  "libpango-1.0-0",
  "libcairo2",
  "libglib2.0-0t64",
  "libx11-6",
  "libxcb1",
  "libxext6",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libxkbcommon0",
  "libxshmfence1",
  "fonts-liberation"
]
